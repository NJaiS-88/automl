services:
  - type: web
    name: automl-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PROJECT_ROOT
        value: /opt/render/project/src
      - key: CLIENT_URL
        sync: false
